version: 0.2
env:
  variables:
    STACK_NAME: "aws-pipeline-stack"
    ARTIFACTS_BUCKET: ""
phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - python -m pip install --upgrade pip
      - pip install aws-sam-cli awscli
  pre_build:
    commands:
      - echo "Starting SAM build..."
  build:
    commands:
      - sam build --template-file infrastructure/template.yaml
      - sam package --s3-bucket $ARTIFACTS_BUCKET --output-template-file packaged.yaml
      - sam deploy --template-file packaged.yaml --stack-name $STACK_NAME --capabilities CAPABILITY_NAMED_IAM --no-confirm-changeset
artifacts:
  files:
    - packaged.yaml
