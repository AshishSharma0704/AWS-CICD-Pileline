AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline + CodeBuild pipeline using GitHub source and SAM build/deploy

Parameters:
  GitHubOwner:
    Type: String
    Description: GitHub repository owner (user or org)
  GitHubRepo:
    Type: String
    Description: GitHub repository name
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to build from
  GitHubTokenSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing GitHub token under key `token`
  ArtifactBucketName:
    Type: String
    Description: S3 bucket for pipeline artifacts (will be created if empty)
    Default: ''
  StackNamePrefix:
    Type: String
    Default: aws-pipeline

Resources:
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: CreateArtifactBucket
    Properties:
      BucketName: !Sub "${StackNamePrefix}-pipeline-artifacts-${AWS::AccountId}-${AWS::Region}"

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackNamePrefix}-codebuild-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeBuildDeveloperAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
        - arn:aws:iam::aws:policy/IAMFullAccess

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${StackNamePrefix}-build"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:6.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: ARTIFACTS_BUCKET
            Value: !Ref ArtifactBucketName
      Source:
        Type: CODEPIPELINE
      TimeoutInMinutes: 60

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackNamePrefix}-codepipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodePipelineFullAccess

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !If [ CreateArtifactBucket, !Ref PipelineArtifactBucket, !Ref ArtifactBucketName ]
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub_Source
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: '1'
              Configuration:
                Owner: !Ref GitHubOwner
                Repo: !Ref GitHubRepo
                Branch: !Ref GitHubBranch
                OAuthToken: !Sub "{{resolve:secretsmanager:${GitHubTokenSecretArn}:SecretString:token}}"
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: BuildAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

Conditions:
  CreateArtifactBucket: !Equals [ !Ref ArtifactBucketName, '' ]

Outputs:
  PipelineName:
    Description: Name of the CodePipeline
    Value: !Ref Pipeline
